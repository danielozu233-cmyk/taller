<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galvez Garage</title>

<style>
body{font-family:Arial;background:#0f172a;color:#fff;margin:0}
.screen{display:none;padding:20px}
.active{display:block}
.container{max-width:500px;margin:auto}
input,button,select{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:none}
button{background:#ff2c00;color:#fff;font-weight:bold}
.card{background:#1e293b;padding:15px;border-radius:12px;margin-top:10px}
img{width:100%;border-radius:10px}
h1,h2{text-align:center}
a{color:#25D366}
</style>

</head>
<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <div class="container">
    <h1>🔧 Galvez Garage</h1>
    <input id="placaInput" placeholder="Ingresa tu placa">
    <button onclick="entrar()">Ingresar</button>
  </div>
</div>

<!-- CLIENTE -->
<div id="cliente" class="screen">
  <div class="container">
    <h2>📋 Información</h2>
    <div id="infoMoto"></div>

    <h2>🛠️ Historial</h2>
    <div id="historial"></div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="screen">
  <div class="container">

    <h2>⚙️ Admin</h2>

    <h3>Registrar Moto</h3>
    <input id="placa" placeholder="Placa">
    <input id="clienteNombre" placeholder="Cliente">
    <input id="marca" placeholder="Marca">
    <input id="modelo" placeholder="Modelo">
    <input id="hp" placeholder="HP">
    <input id="torque" placeholder="Torque Nm">
    <input id="velocidad" placeholder="Velocidad Máx">
    <input type="file" id="foto">
    <button onclick="guardarMoto()">Guardar Moto</button>

    <h3>Subir Servicio</h3>
    <input id="placaServicio" placeholder="Placa">
    <select id="tipo">
      <option>Mayor</option>
      <option>Menor</option>
    </select>
    <input type="file" id="pdf">
    <button onclick="subirServicio()">Subir Servicio</button>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

const firebaseConfig = {
  apiKey: "AIzaSyCKRB49LOhaR79NI8CwypqCMf_10GHd77k",
  authDomain: "reports-e956a.firebaseapp.com",
  projectId: "reports-e956a",
storageBucket: "reports-e956a.firebasestorage.app",
  messagingSenderId: "1058914487818",
  appId: "1:1058914487818:web:ef0e53d4a400cb85a199f3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const storage = getStorage(app);

const ADMIN_CODE = "ADMIN123";

// navegación
function show(screen){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(screen).classList.add('active');
}

// LOGIN
window.entrar = async function(){
  const placa = document.getElementById('placaInput').value.toUpperCase();

  if(placa === ADMIN_CODE){
    show('admin');
    return;
  }

  const refDoc = doc(db, "motos", placa);
  const snap = await getDoc(refDoc);

  if(!snap.exists()){
    alert("No existe");
    return;
  }

  const data = snap.data();

  document.getElementById("infoMoto").innerHTML = `
    <div class="card">
      <img src="${data.foto}">
      <p><b>Placa:</b> ${placa}</p>
      <p><b>Cliente:</b> ${data.cliente}</p>
      <p><b>Marca:</b> ${data.marca}</p>
      <p><b>Modelo:</b> ${data.modelo}</p>
      <p><b>HP:</b> ${data.hp}</p>
      <p><b>Torque:</b> ${data.torque}</p>
      <p><b>Velocidad:</b> ${data.velocidad}</p>
    </div>
  `;

  let html = "";

  const serviciosRef = collection(db, "motos", placa, "servicios");
  const servicios = await getDocs(serviciosRef);

  servicios.forEach(doc => {
    const s = doc.data();
    html += `
      <div class="card">
        <p><b>${s.tipo}</b></p>
        <p>${s.fecha}</p>
        <a href="${s.pdf}" target="_blank">📄 Ver PDF</a>
      </div>
    `;
  });

  document.getElementById("historial").innerHTML = html;

  show("cliente");
}

// SUBIR IMAGEN
async function subirImagen(file, placa){
  const storageRef = ref(storage, `motos/${placa}/${file.name}`);
  await uploadBytes(storageRef, file);
  return await getDownloadURL(storageRef);
}

// GUARDAR MOTO
window.guardarMoto = async function(){
  const placa = document.getElementById('placa').value.toUpperCase();
  const file = document.getElementById('foto').files[0];

  if(!file){
    alert("Sube una imagen");
    return;
  }

  const url = await subirImagen(file, placa);

  await setDoc(doc(db, "motos", placa), {
    cliente: document.getElementById('clienteNombre').value,
    marca: document.getElementById('marca').value,
    modelo: document.getElementById('modelo').value,
    hp: document.getElementById('hp').value,
    torque: document.getElementById('torque').value,
    velocidad: document.getElementById('velocidad').value,
    foto: url
  });

  alert("Moto registrada");
}

// SUBIR SERVICIO
window.subirServicio = async function(){
  const placa = document.getElementById('placaServicio').value.toUpperCase();
  const tipo = document.getElementById('tipo').value;
  const file = document.getElementById('pdf').files[0];

  const storageRef = ref(storage, `servicios/${placa}/${Date.now()}_${file.name}`);
  await uploadBytes(storageRef, file);
  const url = await getDownloadURL(storageRef);

  await addDoc(collection(db, "motos", placa, "servicios"), {
    tipo,
    fecha: new Date().toLocaleDateString(),
    pdf: url
  });

  alert("Servicio subido");
}

</script>

</body>
</html>
