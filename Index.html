<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galvez Garage</title>

<style>
body{font-family:Arial;background:#0f172a;color:#fff;margin:0}
.screen{display:none;padding:20px}
.active{display:block}
.container{max-width:500px;margin:auto}
input,button,select{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:none}
button{background:#ff2c00;color:#fff;font-weight:bold}
.card{background:#1e293b;padding:15px;border-radius:12px;margin-top:10px}
img{width:100%;border-radius:10px;margin-bottom:10px}
h1,h2{text-align:center}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="screen active">
  <div class="container">
    <h1>🔧 Galvez Garage</h1>
    <input id="placaInput" placeholder="Ingresa tu placa">
    <button onclick="entrar()">Ingresar</button>
  </div>
</div>

<!-- CLIENTE -->
<div id="cliente" class="screen">
  <div class="container">
    <button onclick="location.reload()">⬅ Volver</button>
    <div id="infoMoto"></div>
    <div id="historial"></div>
  </div>
</div>

<!-- ADMIN -->
<div id="admin" class="screen">
  <div class="container">

    <button onclick="location.reload()">⬅ Salir</button>

    <h2>Admin</h2>

    <div class="card">
      <h3>Registrar Moto</h3>
      <input id="placa" placeholder="Placa">
      <input id="clienteNombre" placeholder="Cliente">
      <input id="marca" placeholder="Marca">
      <input id="modelo" placeholder="Modelo">
      <input id="hp" placeholder="HP">
      <input id="torque" placeholder="Torque">
      <input id="velocidad" placeholder="Velocidad">
      <input type="file" id="foto" accept="image/*">
      <button onclick="guardarMoto()">Guardar Moto</button>
    </div>

    <div class="card">
      <h3>Agregar Servicio</h3>
      <input id="placaServicio" placeholder="Placa">
      <select id="tipo">
        <option>Mayor</option>
        <option>Menor</option>
      </select>
      <button onclick="subirServicio()">Guardar Servicio</button>
    </div>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCKRB49LOhaR79NI8CwypqCMf_10GHd77k",
  authDomain: "reports-e956a.firebaseapp.com",
  projectId: "reports-e956a"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const ADMIN_CODE = "ADMIN123";

function show(screen){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(screen).classList.add('active');
}

// 🔥 BASE64 CON COMPRESIÓN
async function toBase64(file){
  return new Promise((resolve) => {
    const img = new Image();
    const reader = new FileReader();

    reader.onload = e => img.src = e.target.result;

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const MAX_WIDTH = 600;

      const scale = MAX_WIDTH / img.width;
      canvas.width = MAX_WIDTH;
      canvas.height = img.height * scale;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      resolve(canvas.toDataURL("image/jpeg", 0.7));
    };

    reader.readAsDataURL(file);
  });
}

// LOGIN
window.entrar = async function(){
  const placa = document.getElementById('placaInput').value.toUpperCase();

  if(placa === ADMIN_CODE){
    show('admin');
    return;
  }

  const refDoc = doc(db, "motos", placa);
  const snap = await getDoc(refDoc);

  if(!snap.exists()){
    alert("No existe");
    return;
  }

  const data = snap.data();

  document.getElementById("infoMoto").innerHTML = `
    <div class="card">
      ${data.foto ? `<img src="${data.foto}">` : ""}
      <h2>${data.marca} ${data.modelo}</h2>
      <p><b>Placa:</b> ${placa}</p>
      <p><b>Cliente:</b> ${data.cliente}</p>
      <p><b>HP:</b> ${data.hp}</p>
      <p><b>Torque:</b> ${data.torque}</p>
      <p><b>Velocidad:</b> ${data.velocidad}</p>
    </div>
  `;

  let html = "<h2>Historial</h2>";

  const serviciosRef = collection(db, "motos", placa, "servicios");
  const servicios = await getDocs(query(serviciosRef, orderBy("fecha", "desc")));

  servicios.forEach(doc => {
    const s = doc.data();
    html += `
      <div class="card">
        <p><b>${s.tipo}</b></p>
        <p>${s.fecha}</p>
      </div>
    `;
  });

  document.getElementById("historial").innerHTML = html;

  show("cliente");
}

// GUARDAR MOTO
window.guardarMoto = async function(){
  const placa = document.getElementById('placa').value.toUpperCase();
  const file = document.getElementById('foto').files[0];

  let base64 = "";

  if(file){
    base64 = await toBase64(file);
  }

  await setDoc(doc(db, "motos", placa), {
    cliente: document.getElementById('clienteNombre').value,
    marca: document.getElementById('marca').value,
    modelo: document.getElementById('modelo').value,
    hp: document.getElementById('hp').value,
    torque: document.getElementById('torque').value,
    velocidad: document.getElementById('velocidad').value,
    foto: base64
  });

  alert("Moto guardada");
}

// GUARDAR SERVICIO
window.subirServicio = async function(){
  const placa = document.getElementById('placaServicio').value.toUpperCase();

  await addDoc(collection(db, "motos", placa, "servicios"), {
    tipo: document.getElementById('tipo').value,
    fecha: new Date().toLocaleDateString()
  });

  alert("Servicio guardado");
}

</script>

</body>
</html>
